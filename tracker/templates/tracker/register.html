<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Brand Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-10" style="background-color:#0a0a0a;">

    <div class="w-full max-w-md px-4">

        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <div class="w-9 h-9 rounded-lg flex items-center justify-center font-bold text-white text-sm" style="background-color:#3b82f6;">BT</div>
                <span class="text-xl font-bold text-white">BrandTracker</span>
            </div>
            <h1 class="text-2xl font-semibold text-white">Crie sua conta</h1>
            <p class="mt-1 text-sm" style="color:#71717a;">Acesso à plataforma de inteligência de marcas</p>
        </div>

        <!-- Card -->
        <div class="rounded-xl p-8" style="background-color:#171717; border:1px solid #262629;">

            <!-- Errors -->
            {% for message in messages %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm"
                 style="background:rgba({% if 'sucesso' in message.tags %}16,185,129,.1{% else %}244,63,94,.1{% endif %}); border:1px solid rgba({% if 'sucesso' in message.tags %}16,185,129,.3{% else %}244,63,94,.3{% endif %}); color:{% if 'success' in message.tags %}#6ee7b7{% else %}#fda4af{% endif %};">
                {{ message }}
            </div>
            {% endfor %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium mb-1.5" style="color:#a1a1aa;">
                        Usuário <span style="color:#f43f5e;">*</span>
                    </label>
                    <input type="text" name="username" required autocomplete="username"
                           placeholder="ex: joao_silva"
                           value="{{ request.POST.username }}"
                           class="w-full px-4 py-2.5 rounded-lg text-sm"
                           style="background:#1e1e22; border:1px solid #262629; color:#e8ecf4; outline:none;"
                           onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 2px rgba(59,130,246,.2)'"
                           onblur="this.style.borderColor='#262629'; this.style.boxShadow='none'">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium mb-1.5" style="color:#a1a1aa;">
                        E-mail <span style="color:#52525b; font-size:11px;">(opcional)</span>
                    </label>
                    <input type="email" name="email" autocomplete="email"
                           placeholder="voce@empresa.com"
                           value="{{ request.POST.email }}"
                           class="w-full px-4 py-2.5 rounded-lg text-sm"
                           style="background:#1e1e22; border:1px solid #262629; color:#e8ecf4; outline:none;"
                           onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 2px rgba(59,130,246,.2)'"
                           onblur="this.style.borderColor='#262629'; this.style.boxShadow='none'">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium mb-1.5" style="color:#a1a1aa;">
                        Senha <span style="color:#f43f5e;">*</span>
                    </label>
                    <input type="password" name="password1" required autocomplete="new-password"
                           placeholder="Mínimo 6 caracteres"
                           class="w-full px-4 py-2.5 rounded-lg text-sm"
                           style="background:#1e1e22; border:1px solid #262629; color:#e8ecf4; outline:none;"
                           onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 2px rgba(59,130,246,.2)'"
                           onblur="this.style.borderColor='#262629'; this.style.boxShadow='none'">
                </div>

                <!-- Confirm password -->
                <div>
                    <label class="block text-sm font-medium mb-1.5" style="color:#a1a1aa;">
                        Confirmar senha <span style="color:#f43f5e;">*</span>
                    </label>
                    <input type="password" name="password2" required autocomplete="new-password"
                           placeholder="Repita a senha"
                           class="w-full px-4 py-2.5 rounded-lg text-sm"
                           style="background:#1e1e22; border:1px solid #262629; color:#e8ecf4; outline:none;"
                           onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 2px rgba(59,130,246,.2)'"
                           onblur="this.style.borderColor='#262629'; this.style.boxShadow='none'">
                </div>

                <button type="submit"
                        class="w-full py-2.5 rounded-lg font-semibold text-sm text-white mt-2"
                        style="background-color:#3b82f6; border:none; cursor:pointer; transition:background .15s;"
                        onmouseover="this.style.backgroundColor='#2563eb'"
                        onmouseout="this.style.backgroundColor='#3b82f6'">
                    Criar conta
                </button>
            </form>

            <div class="mt-6 text-center text-sm" style="color:#52525b;">
                Já tem uma conta?
                <a href="{% url 'login' %}" class="font-medium" style="color:#3b82f6;">Fazer login</a>
            </div>
        </div>

        <p class="text-center mt-6 text-xs" style="color:#3f3f46;">
            Brand Tracker © 2026 — Plataforma de Inteligência de Marcas
        </p>
    </div>

</body>
</html>
