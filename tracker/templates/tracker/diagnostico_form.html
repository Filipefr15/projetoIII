<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Aderência — Brand Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .form-card { background-color: #171717; border: 1px solid #262626; border-radius: 12px; }
        .input-range { accent-color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="max-w-2xl w-full">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white mb-2">Diagnóstico de Aderência de Mercado</h1>
            <p class="text-neutral-500">Avalie o potencial de sucesso do Brand Tracker no seu contexto de negócio.</p>
        </div>

        <form method="POST" class="form-card p-8 space-y-8">
            {% csrf_token %}

            <!-- Informações Básicas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2 text-neutral-400">Nome do Projeto / Empresa</label>
                    <input type="text" name="nome_projeto" required placeholder="Ex: MinhaMarca Inc."
                           class="w-full bg-[#0a0a0a] border border-[#262626] rounded-lg px-4 py-2.5 text-white focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2 text-neutral-400">Setor de Atuação</label>
                    <select name="setor" class="w-full bg-[#0a0a0a] border border-[#262626] rounded-lg px-4 py-2.5 text-white focus:border-blue-500 outline-none transition-all">
                        <option value="TECH">Tecnologia</option>
                        <option value="RETAIL">Varejo</option>
                        <option value="FINANCE">Finanças</option>
                        <option value="AGRO">Agronegócio</option>
                        <option value="OTHER">Outro</option>
                    </select>
                </div>
            </div>

            <hr class="border-[#262626]">

            <!-- Perguntas Escala -->
            <div class="space-y-8">
                <!-- Q1 -->
                <div>
                    <div class="flex justify-between mb-4">
                        <label class="text-sm font-medium text-neutral-300">1. O quanto o monitoramento manual de notícias hoje é um problema (perda de tempo/erros)?</label>
                        <span class="text-blue-500 font-bold text-xs" id="val1">3</span>
                    </div>
                    <input type="range" name="dor_monitoramento" min="1" max="5" value="3" step="1" 
                           class="w-full h-2 bg-neutral-800 rounded-lg appearance-none cursor-pointer input-range"
                           oninput="document.getElementById('val1').innerText = this.value">
                    <div class="flex justify-between text-[10px] text-neutral-600 mt-2">
                        <span>Irrelevante</span>
                        <span>Crítico</span>
                    </div>
                </div>

                <!-- Q2 -->
                <div>
                    <div class="flex justify-between mb-4">
                        <label class="text-sm font-medium text-neutral-300">2. Qual a importância de detectar mudanças de sentimento (positivo/negativo) instantaneamente?</label>
                        <span class="text-blue-500 font-bold text-xs" id="val2">3</span>
                    </div>
                    <input type="range" name="importancia_sentimento" min="1" max="5" value="3" step="1" 
                           class="w-full h-2 bg-neutral-800 rounded-lg appearance-none cursor-pointer input-range"
                           oninput="document.getElementById('val2').innerText = this.value">
                    <div class="flex justify-between text-[10px] text-neutral-600 mt-2">
                        <span>Baixa</span>
                        <span>Vital</span>
                    </div>
                </div>

                <!-- Q3 -->
                <div>
                    <div class="flex justify-between mb-4">
                        <label class="text-sm font-medium text-neutral-300">3. Quanto valor agregaria ter resumos executivos automáticos via IA para a diretoria?</label>
                        <span class="text-blue-500 font-bold text-xs" id="val3">3</span>
                    </div>
                    <input type="range" name="necessidade_ia" min="1" max="5" value="3" step="1" 
                           class="w-full h-2 bg-neutral-800 rounded-lg appearance-none cursor-pointer input-range"
                           oninput="document.getElementById('val3').innerText = this.value">
                    <div class="flex justify-between text-[10px] text-neutral-600 mt-2">
                        <span>Nenhum</span>
                        <span>Muito Alto</span>
                    </div>
                </div>

                <!-- Q4 -->
                <div>
                    <div class="flex justify-between mb-4">
                        <label class="text-sm font-medium text-neutral-300">4. Com que frequência a marca/projeto está exposta a possíveis crises de imagem?</label>
                        <span class="text-blue-500 font-bold text-xs" id="val4">3</span>
                    </div>
                    <input type="range" name="frequencia_crise" min="1" max="5" value="3" step="1" 
                           class="w-full h-2 bg-neutral-800 rounded-lg appearance-none cursor-pointer input-range"
                           oninput="document.getElementById('val4').innerText = this.value">
                    <div class="flex justify-between text-[10px] text-neutral-600 mt-2">
                        <span>Raramente</span>
                        <span>Constantemente</span>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-blue-500/20">
                Gerar Diagnóstico de Mercado
            </button>
        </form>

        <a href="/" class="block text-center mt-8 text-neutral-500 hover:text-neutral-300 text-sm">Voltar ao Dashboard</a>
    </div>

</body>
</html>
